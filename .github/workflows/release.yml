name: Release on version bump

# Semantic-version release automation.
# When package.json "version" changes on main, this creates a matching vX.Y.Z
# git tag and a GitHub Release with auto-generated notes. Idempotent: it skips
# if that release already exists. The semver in package.json is the single
# source of truth — bump it, push, and the tag + release are made for you.
#
# Want fully commit-driven bumps (no manual edit, version derived from
# conventional commits)? This can be swapped for release-please or
# semantic-release — just ask.

on:
  push:
    branches: [main]
    paths: ['package.json']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag + GitHub Release when the version is new
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — nothing to do."
            exit 0
          fi
          echo "Creating release $TAG at $GITHUB_SHA"
          gh release create "$TAG" \
            --title "$TAG" \
            --target "$GITHUB_SHA" \
            --generate-notes

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="The Treble — animated">
  <defs>
    <radialGradient id="ta-gold" cx="40%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#FCE491"/><stop offset="46%" stop-color="#F5C542"/><stop offset="100%" stop-color="#AF7A14"/>
    </radialGradient>
    <radialGradient id="ta-cyan" cx="40%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#A6E6FF"/><stop offset="48%" stop-color="#38BDF8"/><stop offset="100%" stop-color="#136489"/>
    </radialGradient>
    <linearGradient id="ta-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7FE3C0"/><stop offset="100%" stop-color="#1B8C69"/>
    </linearGradient>
    <radialGradient id="ta-glow" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#26A17B" stop-opacity="0.42"/><stop offset="60%" stop-color="#26A17B" stop-opacity="0.08"/><stop offset="100%" stop-color="#26A17B" stop-opacity="0"/>
    </radialGradient>
    <filter id="ta-shadow" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/></filter>
    <linearGradient id="ta-glint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F5C542" stop-opacity="0"/><stop offset="42%" stop-color="#FFFFFF" stop-opacity="0.5"/><stop offset="58%" stop-color="#A8FFDD" stop-opacity="0.45"/><stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="ta-tileclip"><rect x="16" y="16" width="480" height="480" rx="112"/></clipPath>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="112" fill="#0B0E11"/>
  <rect x="17" y="17" width="478" height="478" rx="111" fill="none" stroke="#2A313B" stroke-width="2"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#ta-glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3.4s" repeatCount="indefinite"/>
  </rect>

  <!-- back-left coin (gold) -->
  <g transform="rotate(-23 256 512)" filter="url(#ta-shadow)">
    <circle cx="256" cy="232" r="84" fill="url(#ta-gold)"/>
    <circle cx="256" cy="232" r="84" fill="none" stroke="#7A5410" stroke-width="7" opacity="0.55"/>
    <ellipse cx="228" cy="204" rx="32" ry="19" fill="#FFFFFF" opacity="0.20"/>
  </g>

  <!-- AI stake pulse, emanating from the cyan coin (~365,254) -->
  <circle cx="365" cy="254" r="84" fill="none" stroke="#38BDF8" stroke-width="4">
    <animate attributeName="r" values="80;128" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;0" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <!-- back-right coin (AI cyan) -->
  <g transform="rotate(23 256 512)" filter="url(#ta-shadow)">
    <circle cx="256" cy="232" r="84" fill="url(#ta-cyan)"><animate attributeName="opacity" values="0.85;1;0.85" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="256" cy="232" r="84" fill="none" stroke="#0E5477" stroke-width="7" opacity="0.55"/>
    <ellipse cx="228" cy="204" rx="32" ry="19" fill="#FFFFFF" opacity="0.22"/>
  </g>
  <!-- AI visor + blinking eyes (upright, ~366,254) -->
  <g>
    <rect x="344" y="241" width="44" height="27" rx="9" fill="#062231"/>
    <circle cx="358" cy="254" r="4.4" fill="#8FE0FF"><animate attributeName="fill-opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="374" cy="254" r="4.4" fill="#8FE0FF"><animate attributeName="fill-opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- hero coin (gold) with USD₮ green ring + ₮ -->
  <g filter="url(#ta-shadow)">
    <circle cx="256" cy="274" r="100" fill="url(#ta-ring)"/>
    <circle cx="256" cy="274" r="88" fill="url(#ta-gold)"/>
    <circle cx="256" cy="274" r="88" fill="none" stroke="#7A5410" stroke-width="8" opacity="0.5"/>
    <ellipse cx="222" cy="242" rx="38" ry="22" fill="#FFFFFF" opacity="0.22"/>
    <g stroke="#1A1403" stroke-width="18" stroke-linecap="round" fill="none">
      <path d="M210 242 H302"/><path d="M256 242 V322"/><path d="M228 276 H284"/>
    </g>
  </g>

  <!-- prismatic glint sweep -->
  <g clip-path="url(#ta-tileclip)"><rect x="-320" y="-40" width="160" height="620" fill="url(#ta-glint)" transform="skewX(-16)">
    <animate attributeName="x" values="-320;640;640" keyTimes="0;0.5;1" dur="4.5s" repeatCount="indefinite"/>
  </rect></g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-label="The Treble — trustless pot with an on-device AI player">
  <defs>
    <linearGradient id="th-title" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F5C542"/><stop offset="52%" stop-color="#26A17B"/><stop offset="100%" stop-color="#38BDF8"/></linearGradient>
    <radialGradient id="th-pot" cx="50%" cy="42%" r="62%"><stop offset="0%" stop-color="#F5C542"/><stop offset="55%" stop-color="#E3B02F"/><stop offset="100%" stop-color="#8A6A12"/></radialGradient>
    <linearGradient id="th-ring" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#26A17B"/><stop offset="100%" stop-color="#7FE3C0"/></linearGradient>
    <radialGradient id="th-gold" cx="40%" cy="30%" r="80%"><stop offset="0%" stop-color="#FCE491"/><stop offset="46%" stop-color="#F5C542"/><stop offset="100%" stop-color="#AF7A14"/></radialGradient>
    <radialGradient id="th-cyan" cx="40%" cy="30%" r="80%"><stop offset="0%" stop-color="#A6E6FF"/><stop offset="48%" stop-color="#38BDF8"/><stop offset="100%" stop-color="#136489"/></radialGradient>
    <filter id="th-cshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="9" result="th-blur"/>
      <feOffset in="th-blur" dx="0" dy="6" result="th-off"/>
      <feFlood flood-color="#000000" flood-opacity="0.4" result="th-color"/>
      <feComposite in="th-color" in2="th-off" operator="in" result="th-shadow-out"/>
      <feMerge><feMergeNode in="th-shadow-out"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="th-bg" cx="80%" cy="12%" r="92%"><stop offset="0%" stop-color="#132A20"/><stop offset="45%" stop-color="#0B0E11"/><stop offset="100%" stop-color="#0B0E11"/></radialGradient>
    <filter id="th-soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="13"/></filter>
    <linearGradient id="th-sweep" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#38BDF8" stop-opacity="0"/><stop offset="50%" stop-color="#38BDF8" stop-opacity="0.35"/><stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/></linearGradient>
    <clipPath id="th-clip"><rect width="1280" height="400" rx="20"/></clipPath>
    <linearGradient id="th-gA" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#F5C542" stop-opacity="0"/><stop offset="50%" stop-color="#FFE9A8" stop-opacity="0.95"/><stop offset="100%" stop-color="#F5C542" stop-opacity="0"/></linearGradient>
    <linearGradient id="th-gB" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#26A17B" stop-opacity="0"/><stop offset="50%" stop-color="#A8FFDD" stop-opacity="0.9"/><stop offset="100%" stop-color="#26A17B" stop-opacity="0"/></linearGradient>
    <linearGradient id="th-gC" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#38BDF8" stop-opacity="0"/><stop offset="50%" stop-color="#CFF3FF" stop-opacity="0.95"/><stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/></linearGradient>
    <clipPath id="th-titleclip"><text x="66" y="168" font-family="'Segoe UI', system-ui, sans-serif" font-size="80" font-weight="800" letter-spacing="-2">The Treble</text></clipPath>
  </defs>
  <g clip-path="url(#th-clip)" font-family="'Segoe UI', system-ui, sans-serif">
    <rect width="1280" height="400" fill="url(#th-bg)"/>
    <g stroke="#26A17B" stroke-opacity="0.06"><path d="M0 100H1280M0 200H1280M0 300H1280"/><path d="M160 0V400M320 0V400M480 0V400M640 0V400M800 0V400M960 0V400M1120 0V400"/></g>
    <rect x="-320" y="0" width="320" height="400" fill="url(#th-sweep)"><animate attributeName="x" values="-320;1280" dur="5.5s" repeatCount="indefinite"/></rect>

    <!-- Left brand -->
    <text x="70" y="84" fill="#7FE3C0" font-size="16" letter-spacing="3" font-weight="600">DORAHACKS · TETHER DEV CUP · PEAR × QVAC × WDK</text>
    <text x="66" y="168" fill="url(#th-title)" font-size="80" font-weight="800" letter-spacing="-2">The Treble</text>
    <!-- prismatic tri-color shimmer: gold -> green -> cyan (all three stacks) -->
    <g clip-path="url(#th-titleclip)"><g transform="skewX(-14)">
      <rect x="-200" y="82" width="66" height="108" fill="url(#th-gA)"><animate attributeName="x" values="-200;600" dur="4.2s" repeatCount="indefinite"/></rect>
      <rect x="-200" y="82" width="66" height="108" fill="url(#th-gB)"><animate attributeName="x" values="-200;600" dur="4.2s" begin="0.45s" repeatCount="indefinite"/></rect>
      <rect x="-200" y="82" width="66" height="108" fill="url(#th-gC)"><animate attributeName="x" values="-200;600" dur="4.2s" begin="0.9s" repeatCount="indefinite"/></rect>
    </g></g>
    <text x="70" y="210" fill="#C7D0DA" font-size="22" font-weight="500">A trustless pot where an on-device AI stakes its own money against you.</text>
    <text x="70" y="256" fill="#38BDF8" font-size="18" font-family="monospace" font-weight="700">humans vs. the machine · no server · no house · no cloud</text>
    <!-- pills -->
    <g font-family="monospace" font-size="15" fill="#9AA4B0">
      <g><rect x="70" y="286" width="88" height="38" rx="19" fill="#12161C" stroke="#2A313B"/><circle cx="90" cy="305" r="4" fill="#26A17B"/><text x="102" y="310">Pear</text></g>
      <g><rect x="172" y="286" width="90" height="38" rx="19" fill="#12161C" stroke="#2A313B"/><circle cx="192" cy="305" r="4" fill="#38BDF8"/><text x="204" y="310">QVAC</text></g>
      <g><rect x="276" y="286" width="78" height="38" rx="19" fill="#12161C" stroke="#2A313B"/><circle cx="296" cy="305" r="4" fill="#26A17B"/><text x="308" y="310">WDK</text></g>
      <g><rect x="368" y="286" width="126" height="38" rx="19" fill="#12161C" stroke="#2A313B"/><circle cx="388" cy="305" r="4" fill="#F5C542"/><text x="400" y="310">Autobase</text></g>
    </g>

    <!-- Right: three stakes on the table — one of them is the machine -->
    <g transform="translate(1058,192)">
      <!-- AI stake pulse from the cyan coin -->
      <circle cx="100" cy="-6" r="68" fill="none" stroke="#38BDF8" stroke-width="3">
        <animate attributeName="r" values="66;104" dur="2.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.85;0" dur="2.6s" repeatCount="indefinite"/>
      </circle>
      <!-- left gold coin -->
      <g filter="url(#th-cshadow)">
        <circle cx="-100" cy="-6" r="68" fill="url(#th-gold)"/>
        <circle cx="-100" cy="-6" r="68" fill="none" stroke="#7A5410" stroke-width="6" opacity="0.5"/>
        <ellipse cx="-122" cy="-28" rx="24" ry="14" fill="#FFFFFF" opacity="0.2"/>
      </g>
      <!-- right cyan coin (AI) -->
      <g filter="url(#th-cshadow)">
        <circle cx="100" cy="-6" r="68" fill="url(#th-cyan)"><animate attributeName="opacity" values="0.85;1;0.85" dur="1.8s" repeatCount="indefinite"/></circle>
        <circle cx="100" cy="-6" r="68" fill="none" stroke="#0E5477" stroke-width="6" opacity="0.5"/>
        <ellipse cx="78" cy="-28" rx="24" ry="14" fill="#FFFFFF" opacity="0.22"/>
      </g>
      <rect x="84" y="-16" width="34" height="21" rx="7" fill="#062231"/>
      <circle cx="95" cy="-6" r="3.4" fill="#8FE0FF"><animate attributeName="fill-opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/></circle>
      <circle cx="107" cy="-6" r="3.4" fill="#8FE0FF"><animate attributeName="fill-opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/></circle>
      <!-- hero coin: ₮ in a USD₮ green ring -->
      <g filter="url(#th-cshadow)">
        <circle cx="0" cy="22" r="80" fill="url(#th-ring)"/>
        <circle cx="0" cy="22" r="70" fill="url(#th-gold)"/>
        <circle cx="0" cy="22" r="70" fill="none" stroke="#7A5410" stroke-width="6" opacity="0.5"/>
        <ellipse cx="-24" cy="0" rx="28" ry="16" fill="#FFFFFF" opacity="0.22"/>
        <g stroke="#1A1403" stroke-width="14" stroke-linecap="round" fill="none">
          <path d="M-36 2 H36"/><path d="M0 2 V62"/><path d="M-22 30 H22"/>
        </g>
      </g>
      <!-- pot total -->
      <text y="150" text-anchor="middle" fill="#7FE3C0" font-size="12" letter-spacing="3" font-weight="600">TOTAL POT</text>
      <text y="178" text-anchor="middle" fill="#F5C542" font-size="26" font-weight="800" font-family="monospace">260 USD₮</text>
    </g>
    <!-- AI rationale bubble -->
    <g transform="translate(676,102)" font-family="monospace">
      <rect width="220" height="52" rx="10" fill="#0A2230" stroke="#38BDF8" stroke-opacity="0.5"/>
      <g stroke-linecap="round" fill="none">
        <rect x="13" y="13" width="12" height="9.6" rx="2.2" stroke="#7CD4FF" stroke-width="1.3"/>
        <path d="M19 13V10.9" stroke="#7CD4FF" stroke-width="1.3"/>
        <path d="M13 16.6h-1.5M25 16.6h1.5" stroke="#7CD4FF" stroke-width="1.3"/>
        <path d="M16.7 20.2h4.6" stroke="#7CD4FF" stroke-width="1.2"/>
        <circle cx="19" cy="10.1" r="1" fill="#7CD4FF"/>
        <circle cx="16.6" cy="17.4" r="1.1" fill="#7CD4FF"/>
        <circle cx="21.4" cy="17.4" r="1.1" fill="#7CD4FF"/>
      </g>
      <text x="33" y="22" fill="#7CD4FF" font-size="12">Dugout AI</text>
      <text x="14" y="40" fill="#C7D0DA" font-size="12">stakes 50 USD₮ · 2–1</text>
    </g>

    <!-- badge -->
    <g transform="translate(1040,44)"><rect width="198" height="34" rx="17" fill="#0E2A1E" stroke="#26A17B" stroke-opacity="0.4"/>
      <circle cx="20" cy="17" r="5" fill="#38BDF8"><animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/></circle>
      <text x="34" y="22" fill="#7FE3C0" font-family="monospace" font-size="12" letter-spacing="1">AI CAN'T CHEAT</text></g>

    <rect x="1" y="1" width="1278" height="398" rx="19" fill="none" stroke="#2A313B"/>
  </g>
</svg>

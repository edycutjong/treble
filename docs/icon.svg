<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="46%" r="55%">
      <stop offset="0" stop-color="#26a17b" stop-opacity=".42"/>
      <stop offset=".6" stop-color="#26a17b" stop-opacity=".08"/>
      <stop offset="1" stop-color="#26a17b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gold" cx="36%" cy="30%" r="72%">
      <stop offset="0" stop-color="#ffe9a8"/>
      <stop offset=".5" stop-color="#f5c542"/>
      <stop offset="1" stop-color="#c8901f"/>
    </radialGradient>
    <radialGradient id="blue" cx="36%" cy="30%" r="72%">
      <stop offset="0" stop-color="#bfeaff"/>
      <stop offset=".5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#1f7fb0"/>
    </radialGradient>
  </defs>

  <!-- app tile -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="#0b0e11"/>
  <rect x="17" y="17" width="478" height="478" rx="111" fill="none" stroke="#2a313b" stroke-width="2"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#glow)"/>

  <!-- left coin (gold, behind) -->
  <g>
    <circle cx="170" cy="258" r="74" fill="url(#gold)" stroke="#000" stroke-opacity=".28" stroke-width="3"/>
    <ellipse cx="150" cy="230" rx="30" ry="18" fill="#fff" opacity=".28"/>
  </g>

  <!-- right coin (AI blue, behind) with robot face -->
  <g>
    <circle cx="342" cy="258" r="74" fill="url(#blue)" stroke="#000" stroke-opacity=".28" stroke-width="3"/>
    <ellipse cx="322" cy="230" rx="30" ry="18" fill="#fff" opacity=".30"/>
    <rect x="344" y="241" width="44" height="27" rx="9" fill="#062231"/>
    <circle cx="358" cy="254" r="4.6" fill="#8fe0ff"/>
    <circle cx="374" cy="254" r="4.6" fill="#8fe0ff"/>
  </g>

  <!-- center coin (gold, front) with USD₮ mark + teal ring -->
  <g>
    <circle cx="256" cy="256" r="94" fill="url(#gold)"/>
    <circle cx="256" cy="256" r="94" fill="none" stroke="#26a17b" stroke-width="9"/>
    <circle cx="256" cy="256" r="83" fill="none" stroke="#000" stroke-opacity=".14" stroke-width="2"/>
    <ellipse cx="228" cy="220" rx="34" ry="20" fill="#fff" opacity=".26"/>
    <!-- Tether ₮ -->
    <g fill="#0b0e11">
      <rect x="214" y="212" width="84" height="17" rx="6"/>
      <rect x="232" y="238" width="48" height="16" rx="6"/>
      <rect x="247" y="212" width="18" height="92" rx="6"/>
    </g>
  </g>
</svg>
